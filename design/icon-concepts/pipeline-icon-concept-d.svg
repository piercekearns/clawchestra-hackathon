<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Outer bevel starts right at icon edge -->
    <linearGradient id="bevelBase" x1="0.06" y1="0.06" x2="0.94" y2="0.94">
      <stop offset="0" stop-color="#f7ffcc"/>
      <stop offset="0.22" stop-color="#e6ff4d"/>
      <stop offset="0.55" stop-color="#dfff00"/>
      <stop offset="0.8" stop-color="#c9e63d"/>
      <stop offset="1" stop-color="#f0ffd0"/>
    </linearGradient>

    <linearGradient id="bevelShade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.34"/>
      <stop offset="0.42" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.72" stop-color="#111" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.24"/>
    </linearGradient>

    <!-- Single inner field -->
    <linearGradient id="inner" x1="0.14" y1="0.08" x2="0.88" y2="0.94">
      <stop offset="0" stop-color="#24272b"/>
      <stop offset="0.5" stop-color="#141518"/>
      <stop offset="1" stop-color="#1b1e22"/>
    </linearGradient>

    <radialGradient id="innerWash" cx="0.26" cy="0.18" r="0.95">
      <stop offset="0" stop-color="#dfff00" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#dfff00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Bevel body at full icon bounds -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" fill="url(#bevelBase)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="228" fill="url(#bevelShade)"/>

  <!-- Single inner rounded square -->
  <rect x="96" y="96" width="832" height="832" rx="186" fill="url(#inner)"/>
  <rect x="96" y="96" width="832" height="832" rx="186" fill="url(#innerWash)"/>
  <rect x="96" y="96" width="832" height="832" rx="186" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
</svg>
