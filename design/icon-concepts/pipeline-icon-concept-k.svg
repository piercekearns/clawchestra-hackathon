<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Reverted rim style (pre-flip): lighter top-left, darker toward bottom -->
    <linearGradient id="bevelBase" x1="0.06" y1="0.06" x2="0.94" y2="0.94">
      <stop offset="0" stop-color="#e7ff3a"/>
      <stop offset="0.18" stop-color="#dfff00"/>
      <stop offset="0.6" stop-color="#dfff00"/>
      <stop offset="0.82" stop-color="#c7e100"/>
      <stop offset="1" stop-color="#bdd600"/>
    </linearGradient>

    <linearGradient id="bevelShade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.24"/>
      <stop offset="0.42" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="0.72" stop-color="#111" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.18"/>
    </linearGradient>

    <!-- Flipped inner gradient direction: darker top -> lighter bottom -->
    <linearGradient id="inner" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#131417"/>
      <stop offset="0.5" stop-color="#181b1f"/>
      <stop offset="1" stop-color="#25292d"/>
    </linearGradient>

    <radialGradient id="innerWash" cx="0.26" cy="0.18" r="0.95">
      <stop offset="0" stop-color="#dfff00" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#dfff00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="228" fill="url(#bevelBase)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="228" fill="url(#bevelShade)"/>

  <!-- Slightly thinner rim than previous -->
  <rect x="80" y="80" width="864" height="864" rx="152" fill="url(#inner)"/>
  <rect x="80" y="80" width="864" height="864" rx="152" fill="url(#innerWash)"/>
  <rect x="80" y="80" width="864" height="864" rx="152" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
</svg>
