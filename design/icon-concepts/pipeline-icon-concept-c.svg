<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="outerBase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0b"/>
      <stop offset="0.5" stop-color="#191a1c"/>
      <stop offset="1" stop-color="#2e3134"/>
    </linearGradient>

    <linearGradient id="bevelRim" x1="0.08" y1="0.08" x2="0.92" y2="0.92">
      <stop offset="0" stop-color="#f5f7f8" stop-opacity="0.58"/>
      <stop offset="0.35" stop-color="#9aa0a6" stop-opacity="0.28"/>
      <stop offset="0.72" stop-color="#dfff00" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#f2ffd2" stop-opacity="0.62"/>
    </linearGradient>

    <linearGradient id="bevelShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.24"/>
    </linearGradient>

    <linearGradient id="innerField" x1="0.15" y1="0.05" x2="0.85" y2="0.95">
      <stop offset="0" stop-color="#232629"/>
      <stop offset="0.45" stop-color="#131416"/>
      <stop offset="1" stop-color="#1c1f22"/>
    </linearGradient>

    <radialGradient id="innerBloom" cx="0.22" cy="0.18" r="0.95">
      <stop offset="0" stop-color="#dfff00" stop-opacity="0.14"/>
      <stop offset="0.65" stop-color="#dfff00" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#dfff00" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="innerGlow" cx="0.82" cy="0.86" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full icon body -->
  <rect x="20" y="20" width="984" height="984" rx="224" fill="url(#outerBase)"/>

  <!-- Bevel ring -->
  <rect x="40" y="40" width="944" height="944" rx="206" fill="none" stroke="url(#bevelRim)" stroke-width="26"/>
  <rect x="52" y="52" width="920" height="920" rx="198" fill="none" stroke="url(#bevelShade)" stroke-width="10"/>

  <!-- Clean inner field for future logo -->
  <rect x="122" y="122" width="780" height="780" rx="176" fill="url(#innerField)"/>
  <rect x="122" y="122" width="780" height="780" rx="176" fill="url(#innerBloom)"/>
  <rect x="122" y="122" width="780" height="780" rx="176" fill="url(#innerGlow)"/>

  <!-- Subtle inner edge definition -->
  <rect x="134" y="134" width="756" height="756" rx="166" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
</svg>
