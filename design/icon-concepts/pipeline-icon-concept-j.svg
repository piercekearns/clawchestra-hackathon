<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Flipped: darker top -> lighter bottom -->
    <linearGradient id="bevelBase" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#bdd600"/>
      <stop offset="0.28" stop-color="#c7e100"/>
      <stop offset="0.58" stop-color="#dfff00"/>
      <stop offset="0.82" stop-color="#dfff00"/>
      <stop offset="1" stop-color="#e7ff3a"/>
    </linearGradient>

    <!-- Keep subtle bevel depth, also biased dark->light top->bottom -->
    <linearGradient id="bevelShade" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.14"/>
      <stop offset="0.4" stop-color="#111111" stop-opacity="0.06"/>
      <stop offset="0.76" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.14"/>
    </linearGradient>

    <linearGradient id="inner" x1="0.14" y1="0.08" x2="0.88" y2="0.94">
      <stop offset="0" stop-color="#24272b"/>
      <stop offset="0.5" stop-color="#141518"/>
      <stop offset="1" stop-color="#1b1e22"/>
    </linearGradient>

    <radialGradient id="innerWash" cx="0.26" cy="0.18" r="0.95">
      <stop offset="0" stop-color="#dfff00" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#dfff00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="228" fill="url(#bevelBase)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="228" fill="url(#bevelShade)"/>

  <rect x="84" y="84" width="856" height="856" rx="150" fill="url(#inner)"/>
  <rect x="84" y="84" width="856" height="856" rx="150" fill="url(#innerWash)"/>
  <rect x="84" y="84" width="856" height="856" rx="150" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
</svg>
